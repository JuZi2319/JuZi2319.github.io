<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JuZi2319 的在线 C++ IDE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "微软雅黑", sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00f5d4;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        .editor-container {
            width: 100%;
            height: 55vh;
            border: 2px solid #00f5d4;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        #code-editor {
            width: 100%;
            height: 100%;
            background: #fff;
            color: #000;
            font-family: "Consolas", monospace;
            font-size: 14px;
            padding: 10px;
            border: none;
            resize: none;
        }
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        #run-btn {
            padding: 12px 30px;
            background: #00f5d4;
            color: #1a1a2e;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        #run-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,245,212,0.4);
        }
        #run-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .output-container {
            width: 100%;
            height: 30vh;
            background: #000;
            border: 2px solid #00f5d4;
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            font-size: 1rem;
            line-height: 1.5;
            color: #00f5d4;
            font-family: "Consolas", monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>👨‍💻 JuZi2319 的在线 C++ IDE</h1>
    <div class="editor-container">
        <textarea id="code-editor">#include <iostream>
using namespace std;

int main() {
    cout << "Hello world!" << endl;
    return 0;
}</textarea>
    </div>
    <div class="controls">
        <button id="run-btn">▶ 运行代码</button>
    </div>
    <div class="output-container" id="output"></div>

    <script>
        // 1. 先测试按钮能不能点（最基础的测试）
        const runBtn = document.getElementById('run-btn');
        const outputBox = document.getElementById('output');
        const code编辑or = document.getElementById('code-editor');

        // 先给按钮加一个最基础的点击事件，确保能触发
        runBtn.addEventListener('click', async () => {
            // 第一步：先让按钮变灰，显示加载中
            runBtn.disabled = true;
            runBtn.textContent = "⏳ 编译中...";
            outputBox.textContent = "正在编译运行，请稍候...\n";

            // 第二步：获取代码
            const code = code编辑or.value;

            try {
                // 第三步：调用稳定的 Wandbox API
                const res = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: code,
                        compiler: "gcc-12.2.0",
                        options: "c++17",
                        stdin: ""
                    })
                });

                // 第四步：解析结果
                const data = await res.json();
                if (data.status === "0") {
                    outputBox.textContent = "✅ 运行成功！\n" + data.program_output;
                    if (data.compiler_output && data.compiler_output.trim() !== "") {
                        outputBox.textContent += "\nℹ️ 编译信息：\n" + data.compiler_output;
                    }
                } else {
                    outputBox.textContent = "❌ 编译/运行错误：\n" + data.compiler_output;
                }
            } catch (err) {
                // 捕获所有错误，避免按钮卡死
                outputBox.textContent = "❌ 错误：" + err.message + "\n请检查网络或代码";
            }

            // 第五步：恢复按钮
            runBtn.disabled = false;
            runBtn.textContent = "▶ 运行代码";
        });
    </script>
</body>
</html>
