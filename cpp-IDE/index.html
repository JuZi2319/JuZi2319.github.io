<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JuZi2319 的在线 C++ IDE</title>
    <!-- 引入代码编辑器 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "微软雅黑", "Consolas", sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00f5d4;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        .editor-container {
            width: 100%;
            height: 55vh;
            border: 2px solid #00f5d4;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        /* 强制编辑器撑满容器，解决只显示一点点的问题 */
        .CodeMirror {
            height: 100% !important;
            font-size: 14px;
        }
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        #run-btn {
            padding: 12px 30px;
            background: #00f5d4;
            color: #1a1a2e;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        #run-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,245,212,0.4);
        }
        #run-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .output-container {
            width: 100%;
            height: 30vh;
            background: #000;
            border: 2px solid #00f5d4;
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            font-size: 1rem;
            line-height: 1.5;
            color: #00f5d4;
            font-family: "Consolas", monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>👨‍💻 JuZi2319 的在线 C++ IDE</h1>
    <div class="editor-container">
        <textarea id="code-editor"></textarea>
    </div>
    <div class="controls">
        <button id="run-btn">▶ 运行代码</button>
    </div>
    <div class="output-container" id="output"></div>

    <script>
        // 1. 初始化代码编辑器（自带高亮、行号）
        const editor = 代码Mirror.fromTextArea(document.getElementById('code-editor'), {
            mode: "text/x-c++src",
            theme: "default",
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            auto关闭Brackets: true,
            lineWrapping: true
        });

        // 2. 默认示例代码（打开就有，直接能跑）
        editor.setValue(`#include <iostream>
using namespace std;

int main() {
    cout << "Hello world!" << endl;
    return 0;
}`);

        // 3. 用100%稳定的Wandbox API（无iframe，彻底告别404）
        const runBtn = document.getElementById('run-btn');
        const outputBox = document.getElementById('output');

        runBtn.addEventListener('click', async () => {
            runBtn.disabled = true;
            runBtn.textContent = "⏳ 编译中...";
            outputBox.textContent = "正在编译运行，请稍候...\n";

            const code = editor.getValue();
            try {
                const res = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: code,
                        compiler: "gcc-12.2.0",
                        options: "c++17",
                        stdin: ""
                    })
                });

                const data = await res.json();
                if (data.status === "0") {
                    outputBox.textContent = "✅ 运行成功！\n" + data.program_output;
                    if (data.compiler_output && data.compiler_output.trim() !== "") {
                        outputBox.textContent += "\nℹ️ 编译信息：\n" + data.compiler_output;
                    }
                } else {
                    outputBox.textContent = "❌ 编译/运行错误：\n" + data.compiler_output;
                }
            } catch (err) {
                outputBox.textContent = "❌ 网络错误：" + err.message + "\n请检查网络后重试";
            }

            runBtn.disabled = false;
            runBtn.textContent = "▶ 运行代码";
        });
    </script>
</body>
</html>
