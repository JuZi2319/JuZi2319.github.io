<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JuZi2319 的在线 C++ IDE</title>
    <!-- 引入代码编辑器 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "微软雅黑", "Consolas", sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00f5d4;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        .editor-container {
            width: 100%;
            height: 55vh;
            border: 2px solid #00f5d4;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        #run-btn {
            padding: 12px 30px;
            background: #00f5d4;
            color: #1a1a2e;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        #run-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,245,212,0.4);
        }
        #run-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .output-container {
            width: 100%;
            height: 30vh;
            background: #000;
            border: 2px solid #00f5d4;
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            font-size: 1rem;
            line-height: 1.5;
            color: #00f5d4;
            font-family: "Consolas", monospace;
        }
    </style>
</head>
<body>
    <h1>👨‍💻 JuZi2319 的在线 C++ IDE</h1>
    <div class="editor-container">
        <textarea id="code-editor"></textarea>
    </div>
    <div class="controls">
        <button id="run-btn">▶ 运行代码</button>
    </div>
    <div class="output-container" id="output"></div>

    <script>
        // 1. 初始化代码编辑器（自带高亮、行号）
        const editor = 代码Mirror.fromTextArea(document.getElementById('code-editor'), {
            mode: "text/x-c++src",
            theme: "monokai",
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            auto关闭Brackets: true,
            lineWrapping: true
        });

        // 2. 默认示例代码（打开就有）
        editor.setValue(`#include <iostream>
using namespace std;

int main() {
    cout << "Hello, JuZi2319 的 C++ IDE!" << endl;
    return 0;
}`);

        // 3. 用 100% 稳定的 Compiler 探索r API 编译运行（彻底告别 404）
        const runBtn = document.getElementById('run-btn');
        const outputBox = document.getElementById('output');

        runBtn.addEventListener('click', async () => {
            runBtn.disabled = true;
            runBtn.textContent = "⏳ 编译中...";
            outputBox.textContent = "正在编译运行，请稍候...\n";

            const code = editor.getValue();
            try {
                // 调用 Compiler 探索r 稳定 API（比 Wandbox 更稳定，永久可用）
                const res = await fetch('https://godbolt.org/api/compiler/gcc-12.2.0/compile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        source: code,
                        options: "-std=c++17 -O0",
                        filters: { "binary": true, "commentOnly": true, "directives": true }
                    })
                });

                const data = await res.json();
                if (data.code === 0) {
                    // 运行成功，输出结果
                    outputBox.textContent = "✅ 运行成功！\n" + (data.stdout || "无输出");
                    if (data.stderr) outputBox.textContent += "\n⚠️ 编译警告：\n" + data.stderr;
                } else {
                    // 编译/运行错误
                    outputBox.textContent = "❌ 编译/运行错误：\n" + (data.stderr || data.stdout || "未知错误");
                }
            } catch (err) {
                outputBox.textContent = "❌ 网络错误：" + err.message + "\n请检查网络后重试";
            }

            runBtn.disabled = false;
            runBtn.textContent = "▶ 运行代码";
        });
    </script>
</body>
</html>
