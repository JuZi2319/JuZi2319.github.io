<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JuZi2319 的在线 C++ IDE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "微软雅黑", sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00f5d4;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        .ide-container {
            width: 100%;
            height: 80vh;
            border: 2px solid #00f5d4;
            border-radius: 12px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #1e1e1e;
        }
    </style>
</head>
<body>
    <h1>👨‍💻 JuZi2319 的在线 C++ IDE</h1>
    <div class="ide-container">
        <!-- 稳定版 Wandbox 嵌入，默认 C++17，自带示例代码 -->
        <iframe src="https://wandbox.org/nojs/embed?language=cpp&code=%23include+%3Ciostream%3E%0Ausing+namespace+std%3B%0A%0Aint+main()+%7B%0A++++cout+%3C%3C+%22Hello+from+C%2B%2B!%22+%3C%3C+endl%3B%0A++++return+0%3B%0A%7D"></iframe>
    </div>
</body>
</html>
